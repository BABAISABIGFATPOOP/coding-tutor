<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest - Learn to Code</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Pyodide loaded on demand -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0f1117;
            --bg-card: #1a1d2e;
            --bg-editor: #12141f;
            --bg-sidebar: #151825;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --green: #00b894;
            --green-glow: rgba(0, 184, 148, 0.3);
            --yellow: #fdcb6e;
            --red: #e17055;
            --text: #dfe6e9;
            --text-dim: #636e72;
            --border: #2d3436;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== AUTH SCREEN ===== */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-dark);
        }

        .auth-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            width: 400px;
            text-align: center;
        }

        .auth-logo {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-editor);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .auth-input:focus { border-color: var(--accent); }

        .auth-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .auth-btn-primary {
            background: var(--accent);
            color: white;
        }
        .auth-btn-primary:hover { box-shadow: 0 0 20px var(--accent-glow); }

        .auth-btn-google {
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-btn-google:hover { background: #f0f0f0; }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-dim);
            font-size: 12px;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-toggle {
            color: var(--accent);
            cursor: pointer;
            font-size: 13px;
            margin-top: 16px;
        }
        .auth-toggle:hover { text-decoration: underline; }

        .auth-error {
            color: var(--red);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .auth-guest {
            color: var(--text-dim);
            cursor: pointer;
            font-size: 12px;
            margin-top: 12px;
        }
        .auth-guest:hover { color: var(--text); }

        /* ===== TOP BAR ===== */
        .app-screen { display: none; height: 100vh; flex-direction: column; }
        .app-screen.show { display: flex; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            height: 60px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .topbar-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .stat-value {
            color: var(--text);
            font-weight: 700;
        }

        .xp-bar-container {
            width: 120px;
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a29bfe);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .streak-badge {
            background: linear-gradient(135deg, #e17055, #fdcb6e);
            color: #000;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-email {
            font-size: 12px;
            color: var(--text-dim);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-signout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-signout:hover { border-color: var(--red); color: var(--red); }

        /* ===== LANGUAGE TOGGLE ===== */
        .lang-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-dark);
            padding: 3px;
            border-radius: 8px;
        }

        .lang-btn {
            padding: 5px 14px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-dim);
        }

        .lang-btn.active-js {
            background: #f7df1e;
            color: #000;
        }

        .lang-btn.active-py {
            background: #3776ab;
            color: #fff;
        }

        .lang-btn:hover:not(.active-js):not(.active-py) {
            color: var(--text);
        }

        .pyodide-status {
            font-size: 11px;
            color: var(--text-dim);
            padding: 2px 8px;
        }

        .pyodide-status.loading { color: var(--yellow); }
        .pyodide-status.ready { color: var(--green); }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 4px 16px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            padding: 12px 16px 0;
        }

        .nav-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .nav-tab:hover:not(.active) {
            border-color: var(--accent);
            color: var(--text);
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .lesson-item:hover { background: rgba(108, 92, 231, 0.1); }
        .lesson-item.active { background: rgba(108, 92, 231, 0.2); border: 1px solid var(--accent); }
        .lesson-item.completed .lesson-icon { background: var(--green); }
        .lesson-item.locked { opacity: 0.4; cursor: not-allowed; }

        .lesson-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .lesson-info { flex: 1; }
        .lesson-name { font-size: 13px; font-weight: 600; }
        .lesson-xp { font-size: 11px; color: var(--text-dim); }

        .challenge-item {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .challenge-item:hover { border-color: var(--accent); }
        .challenge-item.completed { border-color: var(--green); }

        .challenge-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .challenge-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }

        .challenge-reward {
            display: inline-block;
            background: rgba(253, 203, 110, 0.15);
            color: var(--yellow);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .difficulty {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .difficulty.easy { background: rgba(0, 184, 148, 0.15); color: var(--green); }
        .difficulty.medium { background: rgba(253, 203, 110, 0.15); color: var(--yellow); }
        .difficulty.hard { background: rgba(225, 112, 85, 0.15); color: var(--red); }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .achievement-item.unlocked {
            border-color: var(--yellow);
            background: rgba(253, 203, 110, 0.05);
        }

        .achievement-item.locked { opacity: 0.35; }

        .achievement-icon {
            font-size: 24px;
            width: 36px;
            text-align: center;
        }

        .achievement-item.locked .achievement-icon { filter: grayscale(1); }
        .achievement-name { font-size: 13px; font-weight: 600; }
        .achievement-desc { font-size: 11px; color: var(--text-dim); }

        /* ===== CONTENT AREA ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .lesson-panel {
            padding: 32px;
            overflow-y: auto;
            flex: 1;
        }

        .lesson-header { margin-bottom: 24px; }

        .lesson-chapter {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .lesson-title { font-size: 28px; font-weight: 800; }

        .lesson-body {
            font-size: 15px;
            line-height: 1.7;
            max-width: 700px;
        }

        .lesson-body p { margin-bottom: 16px; }

        .lesson-body code {
            background: var(--bg-editor);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            color: #a29bfe;
        }

        .lesson-body pre {
            background: var(--bg-editor);
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .lesson-body pre code {
            background: none;
            padding: 0;
            color: var(--text);
        }

        .lesson-body .highlight { color: var(--yellow); font-weight: 600; }
        .lesson-body .concept { color: var(--accent); font-weight: 600; }

        /* ===== EDITOR ===== */
        .editor-section {
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 45%;
            min-height: 250px;
        }

        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .editor-toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .editor-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-run { background: var(--green); color: #000; }
        .btn-run:hover { box-shadow: 0 0 20px var(--green-glow); }

        .btn-submit { background: var(--accent); color: white; }
        .btn-submit:hover { box-shadow: 0 0 20px var(--accent-glow); }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }
        .btn-reset:hover { border-color: var(--text); color: var(--text); }

        .btn-hint {
            background: transparent;
            border: 1px solid var(--yellow);
            color: var(--yellow);
        }

        .editor-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .code-editor { flex: 1; position: relative; }

        .code-editor textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-editor);
            color: var(--text);
            border: none;
            padding: 16px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        .output-panel {
            width: 40%;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .output-header {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .output-content {
            flex: 1;
            padding: 16px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            overflow-y: auto;
            background: var(--bg-editor);
            white-space: pre-wrap;
        }

        .output-content .error { color: var(--red); }
        .output-content .success { color: var(--green); }

        /* Result Banner */
        .result-banner {
            display: none;
            padding: 16px 24px;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease;
        }

        .result-banner.show { display: flex; }
        .result-banner.pass { background: rgba(0, 184, 148, 0.15); border-top: 2px solid var(--green); }
        .result-banner.fail { background: rgba(225, 112, 85, 0.15); border-top: 2px solid var(--red); }

        .result-icon { font-size: 28px; }
        .result-text { flex: 1; }
        .result-title { font-weight: 700; font-size: 16px; }
        .result-detail { font-size: 13px; color: var(--text-dim); }

        .btn-next { background: var(--green); color: #000; padding: 10px 24px; font-weight: 700; }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Achievement Popup */
        .achievement-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border: 2px solid var(--yellow);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            z-index: 1000;
            animation: popIn 0.4s ease;
            box-shadow: 0 0 60px rgba(253, 203, 110, 0.2);
        }

        .achievement-popup.show { display: block; }

        .achievement-popup-icon { font-size: 64px; margin-bottom: 16px; }
        .achievement-popup-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--yellow);
            margin-bottom: 8px;
        }
        .achievement-popup-name { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .achievement-popup-desc { color: var(--text-dim); margin-bottom: 20px; }
        .achievement-popup-xp { color: var(--yellow); font-weight: 700; font-size: 18px; }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        .overlay.show { display: block; }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        @media (max-width: 900px) {
            .sidebar { width: 220px; }
            .output-panel { width: 35%; }
        }
    </style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div class="auth-screen" id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">CodeQuest</div>
        <div class="auth-subtitle">Learn to code with interactive lessons</div>

        <div class="auth-error" id="authError"></div>

        <div id="authForm">
            <input class="auth-input" type="email" id="authEmail" placeholder="Email address">
            <input class="auth-input" type="password" id="authPassword" placeholder="Password">
            <button class="auth-btn auth-btn-primary" id="authSubmitBtn" onclick="authSubmit()">Sign In</button>

            <div class="auth-divider">or</div>

            <button class="auth-btn auth-btn-google" onclick="googleSignIn()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Continue with Google
            </button>

            <div class="auth-toggle" id="authToggle" onclick="toggleAuthMode()">Don't have an account? Sign up</div>
            <div class="auth-guest" onclick="guestSignIn()">Continue as guest (progress saved locally only)</div>
        </div>
    </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div class="app-screen" id="appScreen">
    <div class="topbar">
        <div class="topbar-left">
            <div class="logo">CodeQuest</div>
            <div class="lang-toggle">
                <button class="lang-btn active-js" id="langJs" onclick="switchLang('js')">JavaScript</button>
                <button class="lang-btn" id="langPy" onclick="switchLang('python')">Python</button>
            </div>
            <span class="pyodide-status" id="pyodideStatus"></span>
            <span class="stat">Lv <span class="stat-value" id="levelNum">1</span></span>
            <div class="xp-bar-container">
                <div class="xp-bar-fill" id="xpBar" style="width: 0%"></div>
            </div>
            <span class="stat"><span class="stat-value" id="xpNum">0</span> / <span id="xpMax">100</span> XP</span>
        </div>
        <div class="topbar-stats">
            <span class="stat">Done: <span class="stat-value" id="completedCount">0</span></span>
            <span class="stat">Trophies: <span class="stat-value" id="achievementCount">0</span></span>
            <span id="streakBadge" class="streak-badge" style="display:none"></span>
            <div class="user-info">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-signout" onclick="signOut()">Sign Out</button>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchTab('lessons')">Lessons</div>
                <div class="nav-tab" onclick="switchTab('challenges')">Challenges</div>
                <div class="nav-tab" onclick="switchTab('achievements')">Trophies</div>
            </div>
            <div id="sidebarContent"></div>
        </div>

        <div class="content-area">
            <div class="lesson-panel" id="lessonPanel"></div>

            <div class="editor-section">
                <div class="editor-toolbar">
                    <div class="editor-toolbar-left">
                        <span class="editor-label" id="editorLangLabel">JavaScript</span>
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-hint" onclick="showHint()">Hint</button>
                        <button class="btn btn-reset" onclick="resetCode()">Reset</button>
                        <button class="btn btn-run" onclick="runCode()">Run</button>
                        <button class="btn btn-submit" onclick="submitCode()">Submit</button>
                    </div>
                </div>

// ==================== FIREBASE ====================

const firebaseConfig = {

};

let firebaseReady = false;
let db = null;
let auth = null;
let googleProvider = null;
let currentUser = null;
let isGuest = false;

try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    googleProvider = new firebase.auth.GoogleAuthProvider();
    firebaseReady = true;
} catch(e) {
    console.warn('Firebase init failed:', e);
}

let authMode = 'signin'; // 'signin' or 'signup'

function toggleAuthMode() {
    authMode = authMode === 'signin' ? 'signup' : 'signin';
    document.getElementById('authSubmitBtn').textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
    document.getElementById('authToggle').textContent = authMode === 'signin'
        ? "Don't have an account? Sign up"
        : "Already have an account? Sign in";
    document.getElementById('authError').style.display = 'none';
}

function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
}

async function authSubmit() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!email || !password) return showAuthError('Please enter email and password.');
    if (password.length < 6) return showAuthError('Password must be at least 6 characters.');

    try {
        if (authMode === 'signup') {
            await auth.createUserWithEmailAndPassword(email, password);
        } else {
            await auth.signInWithEmailAndPassword(email, password);
        }
    } catch(e) {
        showAuthError(e.message.replace('Firebase: ', ''));
    }
}

async function googleSignIn() {
    try {
        await auth.signInWithPopup(googleProvider);
    } catch(e) {
        showAuthError(e.message.replace('Firebase: ', ''));
    }
}

function guestSignIn() {
    isGuest = true;
    currentUser = null;
    document.getElementById('userEmail').textContent = 'Guest';
    enterApp();
}

function signOut() {
    if (auth) auth.signOut();
    isGuest = false;
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').classList.remove('show');
}

if (firebaseReady) {
    auth.onAuthStateChanged(user => {
        if (user && !isGuest) {
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email || user.displayName || 'User';
            loadCloudState().then(() => enterApp());
        }
    });
}

function enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('show');
    updateTopBar();
    switchTab(state.currentTab);
    if (state.currentTab === 'lessons') loadLesson(state.currentLesson);
}

// ==================== CLOUD SAVE ====================

async function saveToCloud() {
    if (!firebaseReady || !currentUser || isGuest) return;
    try {
        // Only save serializable data (no functions)
        const saveData = {
            xp: state.xp,
            level: state.level,
            completedLessons: state.completedLessons,
            completedChallenges: state.completedChallenges,
            unlockedAchievements: state.unlockedAchievements,
            streak: state.streak,
            noHintCount: state.noHintCount,
            currentTab: state.currentTab,
            currentLesson: state.currentLesson,
            currentChallenge: state.currentChallenge,
            hintsUsed: state.hintsUsed
        };
        await db.collection('codequest').doc(currentUser.uid).set(saveData);
    } catch(e) {
        console.warn('Cloud save failed:', e);
    }
}

async function loadCloudState() {
    if (!firebaseReady || !currentUser || isGuest) return;
    try {
        const doc = await db.collection('codequest').doc(currentUser.uid).get();
        if (doc.exists) {
            const cloud = doc.data();
            state = { ...defaultState(), ...cloud };
            // Also save to localStorage as backup
            localStorage.setItem('codequest_state', JSON.stringify(state));
        }
    } catch(e) {
        console.warn('Cloud load failed:', e);
        // Fall back to localStorage
        state = loadState();
    }
}

// ==================== PYODIDE ====================

let pyodide = null;
let pyodideLoading = false;

function loadPyodideScript() {
    return new Promise((resolve, reject) => {
        if (window.loadPyodide) return resolve();
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
    });
}

async function loadPyodide_() {
    if (pyodide || pyodideLoading) return;
    pyodideLoading = true;
    const statusEl = document.getElementById('pyodideStatus');
    statusEl.textContent = 'Loading Python (first time only)...';
    statusEl.className = 'pyodide-status loading';
    try {
        await loadPyodideScript();
        pyodide = await loadPyodide();
        statusEl.textContent = 'Python ready';
        statusEl.className = 'pyodide-status ready';
        setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } catch(e) {
        statusEl.textContent = 'Python failed to load';
        statusEl.className = 'pyodide-status';
        console.error('Pyodide load failed:', e);
        pyodideLoading = false;
    }
}

}

// ==================== STATE ====================

function defaultState() {
    return {
        xp: 0, level: 1,
        completedLessons: [], completedChallenges: [],
        unlockedAchievements: [],
        streak: 0, noHintCount: 0,
        currentTab: 'lessons', currentLesson: 0, currentChallenge: null,
        hintsUsed: {}
    };
}

let state = loadState();

function loadState() {
    try {
        const saved = localStorage.getItem('codequest_state');
        if (saved) return { ...defaultState(), ...JSON.parse(saved) };
    } catch(e) {}
    return defaultState();
}

function saveState() {
    localStorage.setItem('codequest_state', JSON.stringify(state));
    saveToCloud();
}

// ==================== CORE ====================

let lessonStartTime = Date.now();

function addXP(amount) {
    state.xp += amount;
    const needed = state.level * 100;
    while (state.xp >= state.level * 100) {
        state.xp -= state.level * 100;
        state.level++;
    }
    updateTopBar();
    saveState();
}

function updateTopBar() {
    const needed = state.level * 100;
    document.getElementById('levelNum').textContent = state.level;
    document.getElementById('xpNum').textContent = state.xp;
    document.getElementById('xpMax').textContent = needed;
    document.getElementById('xpBar').style.width = (state.xp / needed * 100) + '%';
    document.getElementById('completedCount').textContent = state.completedLessons.length + state.completedChallenges.length;
    document.getElementById('achievementCount').textContent = state.unlockedAchievements.length + '/' + achievements.length;
    const streakBadge = document.getElementById('streakBadge');
    if (state.streak >= 2) {
        streakBadge.style.display = 'inline';
        streakBadge.textContent = state.streak + ' streak 🔥';
    } else {
        streakBadge.style.display = 'none';
    }
}

function switchTab(tab) {
    state.currentTab = tab;
    document.querySelectorAll('.nav-tab').forEach((t, i) => {
        t.classList.toggle('active', ['lessons', 'challenges', 'achievements'][i] === tab);
    });
    renderSidebar();
    if (tab === 'lessons') loadLesson(state.currentLesson);
    else if (tab === 'challenges' && state.currentChallenge !== null) loadChallenge(state.currentChallenge);
    else if (tab === 'achievements') renderAchievementsPage();
    saveState();
}

function renderSidebar() {
    const container = document.getElementById('sidebarContent');
    const lessons_ = getLessons();
    const challenges_ = getChallenges();

    if (state.currentTab === 'lessons') {
        container.innerHTML = lessons_.map((l, i) => {
            const completed = state.completedLessons.includes(l.id);
            const locked = i > 0 && !state.completedLessons.includes(lessons_[i-1].id) && !completed;
            const active = i === state.currentLesson;
            return `<div class="sidebar-section">
                <div class="lesson-item ${completed ? 'completed' : ''} ${locked ? 'locked' : ''} ${active ? 'active' : ''}"
                     onclick="${locked ? '' : `loadLesson(${i})`}">
                    <div class="lesson-icon">${completed ? '✓' : locked ? '🔒' : i + 1}</div>
                    <div class="lesson-info">
                        <div class="lesson-name">${l.title}</div>
                        <div class="lesson-xp">+${l.xp} XP</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    } else if (state.currentTab === 'challenges') {
        container.innerHTML = challenges_.map((c, i) => {
            const completed = state.completedChallenges.includes(c.id);
            return `<div class="sidebar-section">
                <div class="challenge-item ${completed ? 'completed' : ''}" onclick="loadChallenge(${i})">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                        <div class="challenge-title">${completed ? '✓ ' : ''}${c.title}</div>
                        <span class="difficulty ${c.difficulty}">${c.difficulty}</span>
                    </div>
                    <div class="challenge-desc">${c.desc.split('\n')[0]}</div>
                    <div class="challenge-reward">+${c.xp} XP</div>
                </div>
            </div>`;
        }).join('');
    } else {
        container.innerHTML = achievements.map(a => {
            const unlocked = state.unlockedAchievements.includes(a.id);
            return `<div class="sidebar-section">
                <div class="achievement-item ${unlocked ? 'unlocked' : 'locked'}">
                    <div class="achievement-icon">${a.icon}</div>
                    <div>
                        <div class="achievement-name">${unlocked ? a.name : '???'}</div>
                        <div class="achievement-desc">${a.desc}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }
}

function loadLesson(index) {
    const lessons_ = getLessons();
    if (index >= lessons_.length) index = 0;
    state.currentLesson = index;
    state.currentChallenge = null;
    const lesson = lessons_[index];
    document.getElementById('lessonPanel').innerHTML = `
        <div class="lesson-header">
            <div class="lesson-chapter">${lesson.chapter}</div>
            <div class="lesson-title">${lesson.title}</div>
        </div>
        <div class="lesson-body">${lesson.body}</div>`;
    document.getElementById('codeInput').value = lesson.starter;
    document.getElementById('outputContent').textContent = '';
    document.getElementById('resultBanner').className = 'result-banner';
    lessonStartTime = Date.now();
    renderSidebar();
    saveState();
}

function loadChallenge(index) {
    const challenges_ = getChallenges();
    state.currentChallenge = index;
    const ch = challenges_[index];
    document.getElementById('lessonPanel').innerHTML = `
        <div class="lesson-header">
            <div class="lesson-chapter">Challenge</div>
            <div class="lesson-title">${ch.title}</div>
        </div>
        <div class="lesson-body">
            <p>${ch.desc.replace(/\n/g, '<br>')}</p>
            <span class="difficulty ${ch.difficulty}">${ch.difficulty}</span>
            &nbsp;<span class="challenge-reward">+${ch.xp} XP</span>
        </div>`;
    document.getElementById('codeInput').value = ch.starter;
    document.getElementById('outputContent').textContent = '';
    document.getElementById('resultBanner').className = 'result-banner';
    lessonStartTime = Date.now();
    renderSidebar();
    saveState();
}

function renderAchievementsPage() {
    document.getElementById('lessonPanel').innerHTML = `
        <div class="lesson-header">
            <div class="lesson-chapter">Your Collection</div>
            <div class="lesson-title">Achievements</div>
        </div>
        <div class="lesson-body">
            <p>Complete lessons and challenges to unlock achievements and earn bonus XP!</p>
            <p><strong>${state.unlockedAchievements.length}</strong> of <strong>${achievements.length}</strong> unlocked</p>
        </div>`;
}

// ==================== CODE EXECUTION ====================

function runCode() { executeAndShow(false); }
function submitCode() { executeAndShow(true); }

async function executeAndShow(isSubmit) {
    const code = document.getElementById('codeInput').value;
    const outputEl = document.getElementById('outputContent');

    let output;
    if (currentLang === 'python') {
        outputEl.innerHTML = '<span class="success">Running Python...</span>';
        output = await executePython(code);
    } else {
        output = executeJS(code);
    }

    outputEl.innerHTML = output.error
        ? `<span class="error">${escapeHtml(output.error)}</span>`
        : escapeHtml(output.text);

    if (!isSubmit) return;

    const challenges_ = getChallenges();
    const lessons_ = getLessons();
    let item, isChallenge = false;
    if (state.currentTab === 'challenges' && state.currentChallenge !== null) {
        item = challenges_[state.currentChallenge];
        isChallenge = true;
    } else {
        item = lessons_[state.currentLesson];
    }

    const passed = !output.error && item.check(output.text);
    showResult(passed, item, isChallenge);
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function executeJS(code) {
    let logs = [];
    let loopCount = 0;
    const maxLoops = 100000;
    const fakeConsole = {
        log: (...args) => {
            if (logs.length > 1000) throw new Error('Too much output! Check for an infinite loop.');
            logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
        }
    };
    // Inject loop protection: add a counter check into while/for loops
    let safeCode = code.replace(/(while\s*\([^)]*\)\s*\{)/g, '$1 if(++__lc__>' + maxLoops + ')throw new Error("Infinite loop detected! Make sure your loop has a way to stop.");');
    safeCode = safeCode.replace(/(for\s*\([^)]*\)\s*\{)/g, '$1 if(++__lc__>' + maxLoops + ')throw new Error("Infinite loop detected! Make sure your loop has a way to stop.");');
    try {
        const fn = new Function('__console__', '__lc__', `"use strict";const console=__console__;const print=__console__.log;const alert=undefined,prompt=undefined,confirm=undefined,fetch=undefined,XMLHttpRequest=undefined;let __lc=0;${safeCode}`);
        fn(fakeConsole, 0);
        return { text: logs.join('\n'), error: null };
    } catch(e) {
        return { text: logs.join('\n'), error: e.toString() };
    }
}

async function executePython(code) {
    if (!pyodide) {
        await loadPyodide_();
        if (!pyodide) return { text: '', error: 'Python is still loading. Please wait and try again.' };
    }
    try {
        // Capture stdout
        pyodide.runPython(`
import sys, io
__stdout_capture = io.StringIO()
sys.stdout = __stdout_capture
`);
        pyodide.runPython(code);
        const output = pyodide.runPython('__stdout_capture.getvalue()');
        // Reset stdout
        pyodide.runPython('sys.stdout = sys.__stdout__');
        return { text: output.replace(/\n$/, ''), error: null };
    } catch(e) {
        try { pyodide.runPython('sys.stdout = sys.__stdout__'); } catch(_) {}
        let msg = e.message || e.toString();
        // Clean up pyodide error messages
        const lines = msg.split('\n');
        const lastLine = lines[lines.length - 1] || msg;
        return { text: '', error: lastLine };
    }
}

function showResult(passed, item, isChallenge) {
    const banner = document.getElementById('resultBanner');
    banner.className = `result-banner show ${passed ? 'pass' : 'fail'}`;
    document.getElementById('resultIcon').textContent = passed ? '🎉' : '❌';
    document.getElementById('resultTitle').textContent = passed ? 'Correct!' : 'Not quite...';

    if (passed) {
        const alreadyDone = isChallenge
            ? state.completedChallenges.includes(item.id)
            : state.completedLessons.includes(item.id);
        const xpGained = alreadyDone ? 0 : item.xp;
        document.getElementById('resultDetail').textContent = alreadyDone
            ? 'Already completed — no extra XP'
            : `+${xpGained} XP earned!`;
        if (!alreadyDone) {
            if (isChallenge) state.completedChallenges.push(item.id);
            else state.completedLessons.push(item.id);
            addXP(xpGained);
            state.streak++;
            if (!state.hintsUsed[item.id]) state.noHintCount++;
            checkAchievements();
        }
        document.getElementById('nextBtn').style.display = isChallenge ? 'none' : 'inline-flex';
    } else {
        state.streak = 0;
        document.getElementById('resultDetail').textContent = "Check your code and try again. Use Hint if you're stuck!";
        document.getElementById('nextBtn').style.display = 'none';
    }
    updateTopBar();
    renderSidebar();
    saveState();
}

function nextLesson() {
    const lessons_ = getLessons();
    if (state.currentLesson < lessons_.length - 1) loadLesson(state.currentLesson + 1);
}

function resetCode() {
    const challenges_ = getChallenges();
    const lessons_ = getLessons();
    if (state.currentTab === 'challenges' && state.currentChallenge !== null) {
        document.getElementById('codeInput').value = challenges_[state.currentChallenge].starter;
    } else {
        document.getElementById('codeInput').value = lessons_[state.currentLesson].starter;
    }
    document.getElementById('outputContent').textContent = '';
    document.getElementById('resultBanner').className = 'result-banner';
}

function showHint() {
    const challenges_ = getChallenges();
    const lessons_ = getLessons();
    let item;
    if (state.currentTab === 'challenges' && state.currentChallenge !== null) {
        item = challenges_[state.currentChallenge];
    } else {
        item = lessons_[state.currentLesson];
    }
    state.hintsUsed[item.id] = true;
    saveState();
    document.getElementById('outputContent').innerHTML = `<span class="success">💡 Hint:\n\n${escapeHtml(item.hint)}</span>`;
}

// ==================== ACHIEVEMENTS ====================

function checkAchievements() {
    const lessons_ = getLessons();
    const challenges_ = getChallenges();
    const completedLessonCount = state.completedLessons.length;
    const completedChallengeCount = state.completedChallenges.length;

    // Check bilingual
    const jsCompleted = state.completedLessons.filter(id => id.startsWith('js_'));
    const pyCompleted = state.completedLessons.filter(id => id.startsWith('py_'));
    const isBilingual = jsCompleted.length > 0 && pyCompleted.length > 0;

    const checks = {
        first_code: () => completedLessonCount >= 1,
        three_lessons: () => completedLessonCount >= 3,
        five_lessons: () => completedLessonCount >= 5,
        all_lessons: () => jsCompleted.length >= jsLessons.length || pyCompleted.length >= pythonLessons.length,
        first_challenge: () => completedChallengeCount >= 1,
        three_challenges: () => completedChallengeCount >= 3,
        all_challenges: () => {
            const jsDone = state.completedChallenges.filter(id => id.startsWith('jsc_')).length >= jsChallenges.length;
            const pyDone = state.completedChallenges.filter(id => id.startsWith('pyc_')).length >= pythonChallenges.length;
            return jsDone || pyDone;
        },
        streak_3: () => state.streak >= 3,
        streak_5: () => state.streak >= 5,
        no_hints: () => state.noHintCount >= 3,
        speed_demon: () => (Date.now() - lessonStartTime) < 30000 && completedLessonCount > 0,
        boss_slayer: () => state.completedLessons.includes('js_fizzbuzz') || state.completedLessons.includes('py_fizzbuzz'),
        bilingual: () => isBilingual,
    };

    for (const a of achievements) {
        if (!state.unlockedAchievements.includes(a.id) && checks[a.id] && checks[a.id]()) {
            unlockAchievement(a);
        }
    }
}

function unlockAchievement(a) {
    state.unlockedAchievements.push(a.id);
    addXP(a.xp);
    saveState();
    document.getElementById('popupIcon').textContent = a.icon;
    document.getElementById('popupName').textContent = a.name;
    document.getElementById('popupDesc').textContent = a.desc;
    document.getElementById('popupXp').textContent = `+${a.xp} Bonus XP!`;
    document.getElementById('overlay').className = 'overlay show';
    document.getElementById('achievementPopup').className = 'achievement-popup show';
}

function closeAchievement() {
    document.getElementById('overlay').className = 'overlay';
    document.getElementById('achievementPopup').className = 'achievement-popup';
    updateTopBar();
    renderSidebar();
}

// ==================== EDITOR TAB KEY ====================

document.getElementById('codeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
    }
});
